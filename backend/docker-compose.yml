version: "3.8"

services:
  backend:
    build: .
    container_name: backend-social
    ports:
      - "4000:4000"
    env_file:
      - .env
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  comment-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    env_file:
      - ./backend/.env
    depends_on:
      - redis
      - mongodb
    restart: always

  message-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    env_file:
      - ./backend/.env
    depends_on:
      - redis
      - mongodb
    restart: always
    command: ["sh", "-c", "npm run build && node dist/workers/message.worker.js"]

  like-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    env_file:
      - ./backend/.env
    depends_on:
      - redis
      - mongodb
    restart: always
    command: ["sh", "-c", "npm run build && node dist/workers/like.worker.js"]

  mongodb:
    image: mongo
    container_name: mongodb-social
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7.2
    container_name: redis-server
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  mongo-data:
  redis-data: